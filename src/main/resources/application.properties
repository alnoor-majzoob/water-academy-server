cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.application.name=water-academy
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/water_academy
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=true
spring.h2.console.enabled=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

scheduler.ga.executor.core-pool-size=1
scheduler.ga.executor.max-pool-size=1
scheduler.ga.executor.queue-capacity=5
scheduler.ga.executor.await-termination-seconds=30
