spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.h2.console.enabled=false

cors.allowed-origins=${CORS_ORIGIN}
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

scheduler.ga.executor.core-pool-size=${GA_EXECUTOR_CORE_POOL_SIZE:1}
scheduler.ga.executor.max-pool-size=${GA_EXECUTOR_MAX_POOL_SIZE:1}
scheduler.ga.executor.queue-capacity=${GA_EXECUTOR_QUEUE_CAPACITY:5}
scheduler.ga.executor.await-termination-seconds=${GA_EXECUTOR_AWAIT_TERMINATION_SECONDS:30}
